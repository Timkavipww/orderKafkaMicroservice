volumes:
  orderdb_data:
  productdb_data:


networks:
  app-network:
    driver: bridge

services:
  orderapi:
    container_name: orderapi
    build:
      context: .
      dockerfile: src/OrderAPI/Dockerfile
    ports:
      - "5002:80"
    env_file:
      - .env
    environment:
      - ConnectionStrings__OrderDefaultConnection=${ORDER_DB_CONNECTION}
      - ConnectionStrings__ProductDefaultConnection=${PRODUCT_DB_CONNECTION}
    depends_on:
      - kafka
      - orderdb
    networks:
      - app-network
  productapi:
    container_name: productapi
    build:
      context: .
      dockerfile: src/ProductAPI/Dockerfile
    ports:
      - "5001:80"
    env_file:
      - .env
    environment:
      - ConnectionStrings__OrderDefaultConnection=${ORDER_DB_CONNECTION}
      - ConnectionStrings__ProductDefaultConnection=${PRODUCT_DB_CONNECTION}
    depends_on:
      - kafka
      - productdb
    networks:
      - app-network

  orderdb:
    image: postgres:latest
    container_name: orderdb
    ports:
      - "5499:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orderDB
    volumes:
      - orderdb_data:/var/lib/postgresql/data
    networks:
      - app-network

  productdb:
    image: postgres:latest
    container_name: productdb
    ports:
      - "5500:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=productDB
    volumes:
      - productdb_data:/var/lib/postgresql/data
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - app-network

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    depends_on:
      - kafka
    ports:
      - 9000:9000
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    networks:
      - app-network
